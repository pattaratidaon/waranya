<!doctype html>
<html lang="th">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>เข้าสู่ระบบผู้ดูแล</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
	<div class="container py-5">
		<div class="row justify-content-center">
			<div class="col-12 col-md-6 col-lg-4">
				<div class="card shadow-sm border-0">
					<div class="card-body p-4">
						<h4 class="mb-4 text-center">เข้าสู่ระบบผู้ดูแล</h4>
						<div id="serverHint" class="alert alert-warning py-2 d-none"></div>

						<div id="loginError" class="alert alert-danger py-2 d-none"></div>

						<form id="loginForm" method="post" action="/login">
							<div class="mb-3">
								<label class="form-label">ชื่อผู้ใช้</label>
								<input type="text" name="username" class="form-control" required>
							</div>
							<div class="mb-3">
								<label class="form-label">รหัสผ่าน</label>
								<input type="password" name="password" class="form-control" required>
							</div>
							<button type="submit" class="btn btn-dark w-100">เข้าสู่ระบบ</button>
						</form>

						<a id="homeLink" href="/" class="btn btn-link w-100 mt-2">กลับหน้าเว็บร้านค้า</a>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script>
		(function () {
			const errorBox = document.getElementById("loginError");
			const serverHint = document.getElementById("serverHint");
			const loginForm = document.getElementById("loginForm");
			const homeLink = document.getElementById("homeLink");

			if (!errorBox || !serverHint || !loginForm || !homeLink) {
				return;
			}

			if (window.location.protocol === "file:") {
				const serverBase = "http://127.0.0.1:5000";
				loginForm.action = `${serverBase}/login`;
				homeLink.href = `${serverBase}/`;
				serverHint.textContent = "กำลังเปิดจากไฟล์โดยตรง: ระบบจะส่งข้อมูลไปที่ http://127.0.0.1:5000 อัตโนมัติ";
				serverHint.classList.remove("d-none");
			}

			const params = new URLSearchParams(window.location.search);
			const errorMessage = params.get("error");

			if (errorMessage) {
				errorBox.textContent = errorMessage;
				errorBox.classList.remove("d-none");
			}
		})();
	</script>
</body>
</html>
