<!doctype html>
<html lang="th">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>แผงควบคุมผู้ดูแล</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
	<nav class="navbar navbar-dark bg-dark">
		<div class="container">
			<span class="navbar-brand mb-0 h1">แผงควบคุมผู้ดูแล</span>
			<div>
				<a href="/" class="btn btn-outline-light btn-sm">ดูหน้าเว็บ</a>
				<a href="/logout" class="btn btn-danger btn-sm">ออกจากระบบ</a>
			</div>
		</div>
	</nav>

	<div class="container py-4">
		<div id="serverHint" class="alert alert-warning d-none"></div>
		<div class="card shadow-sm border-0 mb-4">
			<div class="card-body">
				<h5 class="card-title mb-3">เพิ่มสินค้า</h5>
				<form method="post" action="/admin/add" class="row g-3" enctype="multipart/form-data">
					<div class="col-md-4">
						<label class="form-label">ชื่อสินค้า</label>
						<input type="text" name="name" class="form-control" required>
					</div>
					<div class="col-md-3">
						<label class="form-label">ราคา</label>
						<input type="number" name="price" class="form-control" step="0.01" min="0" required>
					</div>
					<div class="col-md-5">
						<label class="form-label">ลิงก์รูปสินค้า</label>
						<input type="url" name="image_url" class="form-control" placeholder="https://...">
					</div>
					<div class="col-md-5">
						<label class="form-label">หรืออัปโหลดรูปสินค้า</label>
						<div class="input-group">
							<label class="btn btn-outline-secondary mb-0" for="image_file">เลือกไฟล์</label>
							<input type="file" id="image_file" name="image_file" class="d-none" accept=".png,.jpg,.jpeg,.webp,.gif,.svg">
							<span class="form-control" id="image_file_name">ยังไม่ได้เลือกไฟล์</span>
						</div>
						<div class="form-text">ถ้าอัปโหลดไฟล์ ระบบจะใช้ไฟล์นี้แทนลิงก์รูปสินค้า</div>
					</div>
					<div class="col-12">
						<button type="submit" class="btn btn-primary">บันทึกสินค้า</button>
					</div>
				</form>
			</div>
		</div>

		<div class="card shadow-sm border-0">
			<div class="card-body">
				<h5 class="card-title mb-3">รายการสินค้า</h5>
				<div class="table-responsive">
					<table class="table table-striped align-middle mb-0">
						<thead>
							<tr>
								<th>รหัส</th>
								<th>รูป</th>
								<th>ชื่อสินค้า</th>
								<th>ราคา</th>
								<th class="text-end">จัดการ</th>
							</tr>
						</thead>
						<tbody id="adminProductTable"></tbody>
					</table>
				</div>
			</div>
		</div>
	</div>

	<div class="modal fade" id="editProductModal" tabindex="-1" aria-hidden="true">
		<div class="modal-dialog modal-lg modal-dialog-centered">
			<div class="modal-content">
				<div class="modal-header">
					<h5 class="modal-title">แก้ไขสินค้า</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="ปิด"></button>
				</div>
				<form id="editProductForm" method="post" action="/admin/update/0" enctype="multipart/form-data">
					<div class="modal-body">
						<div class="row g-3">
							<div class="col-md-4">
								<label class="form-label">ชื่อสินค้า</label>
								<input type="text" id="edit_name" name="name" class="form-control" required>
							</div>
							<div class="col-md-3">
								<label class="form-label">ราคา</label>
								<input type="number" id="edit_price" name="price" class="form-control" step="0.01" min="0" required>
							</div>
							<div class="col-md-5">
								<label class="form-label">ลิงก์รูปสินค้า</label>
								<input type="url" id="edit_image_url" name="image_url" class="form-control" placeholder="https://...">
							</div>
							<div class="col-12">
								<label class="form-label">หรืออัปโหลดรูปใหม่</label>
								<div class="input-group">
									<label class="btn btn-outline-secondary mb-0" for="edit_image_file">เลือกไฟล์</label>
									<input type="file" id="edit_image_file" name="image_file" class="d-none" accept=".png,.jpg,.jpeg,.webp,.gif,.svg">
									<span class="form-control" id="edit_image_file_name">ยังไม่ได้เลือกไฟล์</span>
								</div>
								<div class="form-text">ถ้าอัปโหลดไฟล์ ระบบจะใช้ไฟล์ใหม่นี้แทนรูปเดิม</div>
							</div>
						</div>
					</div>
					<div class="modal-footer">
						<button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">ยกเลิก</button>
						<button type="submit" class="btn btn-warning">อัปเดตสินค้า</button>
					</div>
				</form>
			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script>
		(function () {
			const input = document.getElementById("image_file");
			const label = document.getElementById("image_file_name");
			const addProductForm = document.querySelector('form[action="/admin/add"]');
			const homeLink = document.querySelector('a[href="/"]');
			const logoutLink = document.querySelector('a[href="/logout"]');
			const serverHint = document.getElementById("serverHint");
			const editInput = document.getElementById("edit_image_file");
			const editLabel = document.getElementById("edit_image_file_name");
			const editModalEl = document.getElementById("editProductModal");
			const editForm = document.getElementById("editProductForm");
			const editName = document.getElementById("edit_name");
			const editPrice = document.getElementById("edit_price");
			const editImageUrl = document.getElementById("edit_image_url");
			const tableBody = document.getElementById("adminProductTable");
			const isFileMode = window.location.protocol === "file:";
			const staticBase = isFileMode ? "../static" : "/static";
			const serverBase = "http://127.0.0.1:5000";
			const defaultImage = `${staticBase}/product-placeholder.svg`;
			const editModal = (!isFileMode && window.bootstrap && editModalEl) ? new bootstrap.Modal(editModalEl) : null;
			let currentProducts = [];

			function formatPrice(price) {
				return Number(price || 0).toLocaleString("th-TH");
			}

			function renderTable(products) {
				currentProducts = products || [];

				if (!tableBody) {
					return;
				}

				if (!products || products.length === 0) {
					tableBody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">ยังไม่มีสินค้าในระบบ</td></tr>';
					return;
				}

				tableBody.innerHTML = products.map((product) => {
					const editButton = isFileMode
						? '<span class="text-muted">แก้ไขได้เมื่อเปิดผ่านระบบ</span>'
						: `<button type="button" class="btn btn-sm btn-outline-primary btn-edit" data-id="${product.id}">แก้ไข</button>`;
					const deleteButton = isFileMode
						? '<span class="text-muted">ลบได้เมื่อเปิดผ่านระบบ</span>'
						: `<form method="post" action="/admin/delete/${product.id}" style="display:inline;"><button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('ยืนยันการลบสินค้านี้?')">ลบ</button></form>`;

					return `
						<tr>
							<td>${product.id}</td>
							<td><img src="${product.image_url || defaultImage}" alt="${product.name}" style="width:64px;height:64px;object-fit:cover;border-radius:8px;" onerror="this.onerror=null;this.src='${defaultImage}';"></td>
							<td>${product.name}</td>
							<td>฿${formatPrice(product.price)}</td>
							<td class="text-end"><div class="d-flex justify-content-end gap-2">${editButton}${deleteButton}</div></td>
						</tr>
					`;
				}).join("");
			}

			function resetEditForm() {
				if (!editForm || !editName || !editPrice || !editImageUrl || !editLabel || !editInput) {
					return;
				}

				editForm.action = "/admin/update/0";
				editName.value = "";
				editPrice.value = "";
				editImageUrl.value = "";
				editInput.value = "";
				editLabel.textContent = "ยังไม่ได้เลือกไฟล์";
			}

			const fallbackProducts = [
				{ id: 1, name: "กล้องดิจิทัล", price: 4990, image_url: `${staticBase}/product-images/camera.svg` },
				{ id: 2, name: "รองเท้าผ้าใบ", price: 1290, image_url: `${staticBase}/product-images/shoes.svg` },
				{ id: 3, name: "สมาร์ทวอทช์", price: 2490, image_url: `${staticBase}/product-images/smartwatch.svg` },
				{ id: 4, name: "กระเป๋าเป้", price: 990, image_url: `${staticBase}/product-images/backpack.svg` },
				{ id: 5, name: "หูฟัง", price: 790, image_url: `${staticBase}/product-images/headphones.svg` },
				{ id: 6, name: "ลำโพง", price: 1590, image_url: `${staticBase}/product-images/speaker.svg` },
				{ id: 7, name: "คอมพิวเตอร์", price: 22900, image_url: `${staticBase}/product-images/computer.svg` },
				{ id: 8, name: "โน๊ตบุ๊ค", price: 18900, image_url: `${staticBase}/product-images/laptop.svg` }
			];

			if (!input || !label) {
				renderTable(fallbackProducts);
				return;
			}

			if (isFileMode) {
				if (addProductForm) {
					addProductForm.action = `${serverBase}/admin/add`;
				}
				if (editForm) {
					editForm.action = `${serverBase}/admin/update/0`;
				}
				if (homeLink) {
					homeLink.href = `${serverBase}/`;
				}
				if (logoutLink) {
					logoutLink.href = `${serverBase}/logout`;
				}
				if (serverHint) {
					serverHint.textContent = "กำลังเปิดจากไฟล์โดยตรง: ระบบจะเชื่อมไปที่ http://127.0.0.1:5000 อัตโนมัติ";
					serverHint.classList.remove("d-none");
				}
			}

			input.addEventListener("change", function () {
				label.textContent = input.files && input.files.length > 0 ? input.files[0].name : "ยังไม่ได้เลือกไฟล์";
			});

			if (editInput && editLabel) {
				editInput.addEventListener("change", function () {
					editLabel.textContent = editInput.files && editInput.files.length > 0 ? editInput.files[0].name : "ยังไม่ได้เลือกไฟล์";
				});
			}

			if (editModalEl) {
				editModalEl.addEventListener("hidden.bs.modal", function () {
					resetEditForm();
				});
			}

			if (tableBody && editForm && editName && editPrice && editImageUrl) {
				tableBody.addEventListener("click", function (event) {
					const editBtn = event.target.closest(".btn-edit");
					if (!editBtn) {
						return;
					}

					const productId = Number(editBtn.getAttribute("data-id"));
					const product = currentProducts.find((item) => Number(item.id) === productId);

					if (!product) {
						return;
					}

					editForm.action = `/admin/update/${product.id}`;
					editName.value = product.name || "";
					editPrice.value = product.price || 0;
					editImageUrl.value = product.image_url || "";
					if (editInput && editLabel) {
						editInput.value = "";
						editLabel.textContent = "ยังไม่ได้เลือกไฟล์";
					}
					if (editModal) {
						editModal.show();
					}
				});
			}

			if (isFileMode) {
				renderTable(fallbackProducts);
				return;
			}

			fetch("/api/products")
				.then((response) => {
					if (!response.ok) {
						throw new Error("โหลดสินค้าไม่สำเร็จ");
					}
					return response.json();
				})
				.then((products) => renderTable(products))
				.catch(() => renderTable(fallbackProducts));
		})();
	</script>
</body>
</html>
